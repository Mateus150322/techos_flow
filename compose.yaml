services:
  postgres:
    image: postgres:16-alpine
    container_name: techos-flow-postgres
    environment:
      POSTGRES_DB: techos_flow
      POSTGRES_USER: techos_flow
      POSTGRES_PASSWORD: techos_flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techos_flow -d techos_flow"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techos-flow-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://backend:8000
      APP_LOCALE: pt_BR
      APP_FALLBACK_LOCALE: pt_BR
      APP_FAKER_LOCALE: pt_BR
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: techos_flow
      DB_USERNAME: techos_flow
      DB_PASSWORD: techos_flow
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SANCTUM_EXPIRATION: 480
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1,frontend:5173,localhost:5173,127.0.0.1:5173
      FILESYSTEM_DISK: local
      LARAVEL_PDF_DRIVER: dompdf
      LARAVEL_PDF_DOMPDF_REMOTE_ENABLED: "false"
      RUN_MIGRATIONS_ON_START: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techos-flow-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_API_PROXY_HOST: backend
      VITE_APP_HOST: localhost
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  backend_vendor:
  backend_storage:
  frontend_node_modules:
