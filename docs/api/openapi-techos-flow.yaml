openapi: 3.0.3
info:
  title: TechOS Flow API
  version: 1.2.0
  description: >
    Especificação resumida da API REST do TechOS Flow. Esta definição reflete os
    fluxos atuais de autenticação, ordens de serviço, evidências, relatórios,
    horas extras e administração.
servers:
  - url: http://backend-flow.test/api/v1
    description: Backend local direto
  - url: http://techosflow.test:5173/api/v1
    description: Frontend local com proxy do Vite
  - url: https://www.techosflow.com.br/api/v1
    description: Produção com domínio próprio
  - url: https://techosflow-production.up.railway.app/api/v1
    description: Backend Railway direto
security:
  - bearerAuth: []
tags:
  - name: Saúde
  - name: Autenticação
  - name: Dashboards
  - name: Ordens de Serviço
  - name: Anexos
  - name: Relatórios
  - name: Horas Extras
  - name: Usuários
  - name: Colaboradores Operacionais
  - name: Funcionários
paths:
  /health:
    get:
      tags: [Saúde]
      summary: Verificar disponibilidade da API
      security: []
      responses:
        "200":
          description: API disponível

  /login:
    post:
      tags: [Autenticação]
      summary: Autenticar usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Credenciais inválidas
        "403":
          description: Usuário inativo
        "429":
          description: Muitas tentativas

  /esqueci-senha:
    post:
      tags: [Autenticação]
      summary: Solicitar link de recuperação de senha
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Solicitação processada
        "422":
          description: Falha de validação
        "429":
          description: Muitas tentativas

  /redefinir-senha:
    post:
      tags: [Autenticação]
      summary: Redefinir senha a partir de token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Senha redefinida
        "422":
          description: Token inválido ou falha de validação
        "429":
          description: Muitas tentativas

  /logout:
    post:
      tags: [Autenticação]
      summary: Encerrar sessão atual
      responses:
        "200":
          description: Logout realizado

  /me:
    get:
      tags: [Autenticação]
      summary: Obter usuário autenticado
      responses:
        "200":
          description: Dados do usuário autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /me/alterar-senha:
    post:
      tags: [Autenticação]
      summary: Alterar senha do usuário autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Senha alterada
        "422":
          description: Falha de validação

  /dashboard/admin:
    get:
      tags: [Dashboards]
      summary: Consultar dashboard do administrador
      responses:
        "200":
          description: Indicadores administrativos
        "403":
          description: Perfil não autorizado

  /dashboard/atendente:
    get:
      tags: [Dashboards]
      summary: Consultar dashboard do atendente
      responses:
        "200":
          description: Indicadores do atendente
        "403":
          description: Perfil não autorizado

  /dashboard/tecnico:
    get:
      tags: [Dashboards]
      summary: Consultar dashboard do técnico
      responses:
        "200":
          description: Indicadores do técnico
        "403":
          description: Perfil não autorizado

  /ordens-servico:
    get:
      tags: [Ordens de Serviço]
      summary: Listar ordens de serviço
      parameters:
        - $ref: "#/components/parameters/StatusParam"
        - $ref: "#/components/parameters/PrioridadeParam"
        - $ref: "#/components/parameters/TipoParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Lista paginada de ordens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrders"
    post:
      tags: [Ordens de Serviço]
      summary: Criar ordem de serviço
      description: >
        Disponível para atendente criar OS geral e para técnico criar OS de
        Manutenção ETA/ETE. O administrador não abre OS pelo sistema; ele consulta,
        acompanha indicadores e gera relatórios.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: OS criada
        "422":
          description: Falha de validação
        "403":
          description: Perfil não autorizado

  /ordens-servico/opcoes-filtro:
    get:
      tags: [Ordens de Serviço]
      summary: Consultar opções de filtro
      responses:
        "200":
          description: Opções disponíveis

  /ordens-servico/resumo:
    get:
      tags: [Ordens de Serviço]
      summary: Consultar resumo de ordens
      responses:
        "200":
          description: Resumo consolidado

  /ordens-servico/{id}:
    get:
      tags: [Ordens de Serviço]
      summary: Consultar detalhe de uma OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: Detalhe da OS
        "404":
          description: OS não encontrada

  /ordens-servico/{id}/aceitar:
    post:
      tags: [Ordens de Serviço]
      summary: Aceitar OS aberta sem responsável
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: OS aceita
        "403":
          description: Perfil não autorizado
        "422":
          description: Estado inválido

  /ordens-servico/{id}/iniciar:
    post:
      tags: [Ordens de Serviço]
      summary: Iniciar execução da OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "201":
          description: Execução criada
        "403":
          description: Perfil não autorizado
        "422":
          description: Estado inválido

  /ordens-servico/{id}/execucoes/finalizar:
    post:
      tags: [Ordens de Serviço]
      summary: Finalizar execução da OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinishExecutionRequest"
      responses:
        "200":
          description: Execução finalizada e horas extras calculadas
        "403":
          description: Perfil não autorizado
        "422":
          description: Falha de validação ou estado inválido

  /ordens-servico/{id}/nao-executada:
    post:
      tags: [Ordens de Serviço]
      summary: Marcar OS como não executada
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotExecutedRequest"
      responses:
        "200":
          description: OS encerrada como não executada
        "403":
          description: Perfil não autorizado
        "422":
          description: Falha de validação

  /ordens-servico/{id}/anexos:
    post:
      tags: [Anexos]
      summary: Enviar evidência para uma OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AttachmentUploadRequest"
      responses:
        "201":
          description: Anexo enviado com sucesso
        "403":
          description: Técnico não autorizado
        "422":
          description: Falha de validação do anexo

  /ordens-servico/{id}/relatorio/pdf:
    get:
      tags: [Relatórios]
      summary: Gerar PDF detalhado da ordem de serviço
      description: Disponível apenas para o perfil administrador.
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: PDF gerado
        "403":
          description: Perfil não autorizado

  /anexos/{id}/arquivo:
    get:
      tags: [Anexos]
      summary: Obter conteúdo do anexo privado
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conteúdo do anexo
        "403":
          description: Perfil não autorizado
        "404":
          description: Anexo não encontrado

  /relatorios/ordens-servico:
    get:
      tags: [Relatórios]
      summary: Consultar relatório administrativo de ordens
      responses:
        "200":
          description: Relatório de ordens
        "403":
          description: Perfil não autorizado

  /relatorios/ordens-servico/exportar/{format}:
    get:
      tags: [Relatórios]
      summary: Exportar relatório de ordens
      parameters:
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [csv, xlsx, pdf]
      responses:
        "200":
          description: Arquivo exportado
        "422":
          description: Formato inválido

  /relatorios/horas-extras:
    get:
      tags: [Horas Extras]
      summary: Consultar relatório administrativo de horas extras
      responses:
        "200":
          description: Relatório de horas extras
        "403":
          description: Perfil não autorizado

  /relatorios/horas-extras/exportar/{format}:
    get:
      tags: [Horas Extras]
      summary: Exportar relatório de horas extras
      parameters:
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [csv, xlsx, pdf]
      responses:
        "200":
          description: Arquivo exportado
        "422":
          description: Formato inválido

  /usuarios:
    get:
      tags: [Usuários]
      summary: Listar usuários
      responses:
        "200":
          description: Lista paginada de usuários
        "403":
          description: Perfil não autorizado
    post:
      tags: [Usuários]
      summary: Criar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Usuário criado
        "422":
          description: Falha de validação

  /usuarios/{id}:
    get:
      tags: [Usuários]
      summary: Consultar usuário
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados do usuário
    put:
      tags: [Usuários]
      summary: Atualizar usuário
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Usuário atualizado
        "422":
          description: Falha de validação ou regra de negócio

  /colaboradores-operacionais:
    get:
      tags: [Colaboradores Operacionais]
      summary: Listar colaboradores operacionais
      responses:
        "200":
          description: Lista paginada de colaboradores operacionais
        "403":
          description: Perfil não autorizado
    post:
      tags: [Colaboradores Operacionais]
      summary: Criar colaborador operacional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateColaboradorRequest"
      responses:
        "201":
          description: Colaborador criado
        "422":
          description: Falha de validação

  /colaboradores-operacionais/{id}:
    put:
      tags: [Colaboradores Operacionais]
      summary: Atualizar colaborador operacional
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateColaboradorRequest"
      responses:
        "200":
          description: Colaborador atualizado
        "422":
          description: Falha de validação

  /funcionarios:
    get:
      tags: [Funcionários]
      summary: Listar usuários e colaboradores elegíveis para equipe
      responses:
        "200":
          description: Lista consolidada para composição de equipe
        "403":
          description: Perfil não autorizado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    OrderIdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    StatusParam:
      in: query
      name: status
      schema:
        type: string
        enum: [aberta, em_execucao, finalizada, nao_executada, cancelada]
    PrioridadeParam:
      in: query
      name: prioridade
      schema:
        type: integer
        enum: [1, 2, 3]
    TipoParam:
      in: query
      name: tipo
      schema:
        type: string
    SearchParam:
      in: query
      name: q
      schema:
        type: string
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
    PerPageParam:
      in: query
      name: per_page
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [administrador, tecnico, atendente]
        is_active:
          type: boolean
        must_change_password:
          type: boolean
        valor_hora:
          type: number
          nullable: true
    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
    Address:
      type: object
      required: [logradouro, bairro, cidade, estado, cep]
      properties:
        logradouro:
          type: string
        numero:
          type: string
          nullable: true
        complemento:
          type: string
          nullable: true
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          minLength: 2
          maxLength: 2
        cep:
          type: string
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        numero:
          type: string
        tipo:
          type: string
        nome_cliente:
          type: string
          nullable: true
        status:
          type: string
        prioridade:
          type: integer
        data_abertura:
          type: string
          format: date-time
        data_encerramento:
          type: string
          format: date-time
          nullable: true
        descricao:
          type: string
        motivo_nao_execucao:
          type: string
          nullable: true
    PaginatedOrders:
      type: object
      properties:
        current_page:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer
    CreateOrderRequest:
      type: object
      required: [tipo_servico, prioridade, descricao, endereco]
      properties:
        tipo_servico:
          type: string
        nome_cliente:
          type: string
          nullable: true
        prioridade:
          type: integer
          enum: [1, 2, 3]
        descricao:
          type: string
        data_abertura:
          type: string
          format: date-time
        endereco:
          $ref: "#/components/schemas/Address"
    FinishExecutionRequest:
      type: object
      required: [execucao_id]
      properties:
        execucao_id:
          type: string
          format: uuid
        data_fim:
          type: string
          format: date-time
        observacao:
          type: string
        funcionarios:
          type: array
          items:
            type: object
            properties:
              funcionario_id:
                type: string
                format: uuid
              colaborador_operacional_id:
                type: string
                format: uuid
              data_inicio:
                type: string
                format: date-time
              data_fim:
                type: string
                format: date-time
    NotExecutedRequest:
      type: object
      required: [motivo_nao_execucao]
      properties:
        motivo_nao_execucao:
          type: string
    AttachmentUploadRequest:
      type: object
      required: [arquivo]
      properties:
        arquivo:
          type: string
          format: binary
        tipo:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        precisao_metros:
          type: number
        geolocalizacao_capturada_em:
          type: string
          format: date-time
        rua_capturada:
          type: string
        bairro_capturado:
          type: string
        cidade_capturada:
          type: string
        estado_capturado:
          type: string
        endereco_capturado:
          type: string
    CreateUserRequest:
      type: object
      required: [name, email, role, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [administrador, tecnico, atendente]
        password:
          type: string
        valor_hora:
          type: number
          nullable: true
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [administrador, tecnico, atendente]
        password:
          type: string
        is_active:
          type: boolean
        valor_hora:
          type: number
          nullable: true
    CreateColaboradorRequest:
      type: object
      required: [name, funcao, valor_hora]
      properties:
        name:
          type: string
        funcao:
          type: string
        valor_hora:
          type: number
    UpdateColaboradorRequest:
      type: object
      properties:
        name:
          type: string
        funcao:
          type: string
        valor_hora:
          type: number
        is_active:
          type: boolean
