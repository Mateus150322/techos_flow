openapi: 3.0.3
info:
  title: TechOS Flow API
  version: 1.1.0
  description: >
    Especificação principal da API REST do TechOS Flow. Esta definição resume
    os recursos públicos e protegidos atualmente implementados no projeto.
servers:
  - url: http://backend-flow.test/api/v1
    description: Backend local direto
  - url: http://techosflow.test:5173/api/v1
    description: Frontend local com proxy do Vite
  - url: https://api.techosflow.com.br/api/v1
    description: Produção (exemplo)
security:
  - bearerAuth: []
tags:
  - name: Saúde
  - name: Autenticação
  - name: Dashboards
  - name: Ordens de Serviço
  - name: Anexos
  - name: Relatórios
  - name: Horas Extras
  - name: Funcionários
  - name: Usuários
paths:
  /health:
    get:
      tags: [Saúde]
      summary: Verificar disponibilidade da API
      security: []
      responses:
        "200":
          description: API disponível

  /login:
    post:
      tags: [Autenticação]
      summary: Autenticar usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Credenciais inválidas
        "403":
          description: Usuário inativo
        "429":
          description: Muitas tentativas de login

  /esqueci-senha:
    post:
      tags: [Autenticação]
      summary: Solicitar link de recuperação de senha
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Solicitação processada
        "422":
          description: Falha de validação
        "429":
          description: Muitas tentativas

  /redefinir-senha:
    post:
      tags: [Autenticação]
      summary: Redefinir senha a partir do token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Senha redefinida
        "422":
          description: Token inválido ou falha de validação
        "429":
          description: Muitas tentativas

  /logout:
    post:
      tags: [Autenticação]
      summary: Encerrar sessão atual
      responses:
        "200":
          description: Logout realizado

  /me:
    get:
      tags: [Autenticação]
      summary: Obter usuário autenticado
      responses:
        "200":
          description: Dados do usuário autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /me/alterar-senha:
    post:
      tags: [Autenticação]
      summary: Alterar senha do usuário autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Senha atualizada
        "422":
          description: Falha de validação ou senha atual incorreta

  /dashboard/admin:
    get:
      tags: [Dashboards]
      summary: Obter dashboard administrativo
      responses:
        "200":
          description: Dados do dashboard

  /dashboard/atendente:
    get:
      tags: [Dashboards]
      summary: Obter dashboard do atendente
      responses:
        "200":
          description: Dados do dashboard do atendente

  /dashboard/tecnico:
    get:
      tags: [Dashboards]
      summary: Obter dashboard do técnico
      responses:
        "200":
          description: Dados do dashboard do técnico

  /ordens-servico:
    get:
      tags: [Ordens de Serviço]
      summary: Listar ordens de serviço
      parameters:
        - $ref: "#/components/parameters/StatusParam"
        - $ref: "#/components/parameters/PrioridadeParam"
        - $ref: "#/components/parameters/TipoParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Lista paginada de ordens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedOrders"
    post:
      tags: [Ordens de Serviço]
      summary: Criar ordem de serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Ordem criada com sucesso
        "403":
          description: Perfil sem permissão para o tipo informado
        "422":
          description: Falha de validação

  /ordens-servico/resumo:
    get:
      tags: [Ordens de Serviço]
      summary: Obter resumo agregado das ordens
      responses:
        "200":
          description: Resumo agregado

  /ordens-servico/opcoes-filtro:
    get:
      tags: [Ordens de Serviço]
      summary: Listar opções disponíveis para filtros
      responses:
        "200":
          description: Tipos de serviço cadastrados

  /ordens-servico/{id}:
    get:
      tags: [Ordens de Serviço]
      summary: Consultar detalhe de uma OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: Detalhe da ordem
        "404":
          description: Ordem não encontrada

  /ordens-servico/{id}/aceitar:
    post:
      tags: [Ordens de Serviço]
      summary: Aceitar OS aberta sem responsável
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: OS aceita
        "403":
          description: Somente técnico pode aceitar
        "409":
          description: OS já atribuída
        "422":
          description: OS em estado inválido

  /ordens-servico/{id}/iniciar:
    post:
      tags: [Ordens de Serviço]
      summary: Iniciar execução de OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "201":
          description: Execução iniciada
        "403":
          description: Técnico não autorizado
        "422":
          description: OS em estado inválido ou execução já aberta

  /ordens-servico/{id}/execucoes/finalizar:
    post:
      tags: [Ordens de Serviço]
      summary: Finalizar execução aberta
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinishExecutionRequest"
      responses:
        "200":
          description: Execução finalizada
        "403":
          description: Técnico não autorizado
        "422":
          description: Execução ou OS em estado inválido

  /ordens-servico/{id}/nao-executada:
    post:
      tags: [Ordens de Serviço]
      summary: Encerrar OS como não executada
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotExecutedRequest"
      responses:
        "200":
          description: OS marcada como não executada
        "403":
          description: Técnico não autorizado
        "422":
          description: Motivo ausente ou estado inválido

  /ordens-servico/{id}/anexos:
    post:
      tags: [Anexos]
      summary: Enviar evidência para uma OS
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AttachmentUploadRequest"
      responses:
        "201":
          description: Anexo enviado com sucesso
        "403":
          description: Técnico não autorizado
        "422":
          description: Falha de validação do anexo

  /ordens-servico/{id}/relatorio/pdf:
    get:
      tags: [Relatórios]
      summary: Gerar PDF detalhado da ordem de serviço
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "200":
          description: PDF da ordem gerado
        "403":
          description: Acesso negado
        "404":
          description: Ordem não encontrada

  /anexos/{id}/arquivo:
    get:
      tags: [Anexos]
      summary: Obter conteúdo do anexo privado
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conteúdo do arquivo
        "403":
          description: Acesso negado
        "404":
          description: Anexo não encontrado

  /relatorios/ordens-servico:
    get:
      tags: [Relatórios]
      summary: Consultar relatório gerencial de ordens
      responses:
        "200":
          description: Relatório paginado

  /relatorios/ordens-servico/exportar/{format}:
    get:
      tags: [Relatórios]
      summary: Exportar relatório de ordens
      parameters:
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [csv, xlsx, pdf]
      responses:
        "200":
          description: Arquivo exportado
        "422":
          description: Formato inválido ou limite excedido

  /relatorios/horas-extras:
    get:
      tags: [Horas Extras]
      summary: Consultar relatório de horas extras
      responses:
        "200":
          description: Relatório de horas extras

  /relatorios/horas-extras/exportar/{format}:
    get:
      tags: [Horas Extras]
      summary: Exportar relatório de horas extras
      parameters:
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [csv, xlsx, pdf]
      responses:
        "200":
          description: Arquivo exportado
        "422":
          description: Formato inválido

  /funcionarios:
    get:
      tags: [Funcionários]
      summary: Listar funcionários elegíveis para equipe de execução
      responses:
        "200":
          description: Lista de funcionários

  /usuarios:
    get:
      tags: [Usuários]
      summary: Listar usuários
      responses:
        "200":
          description: Lista paginada de usuários
    post:
      tags: [Usuários]
      summary: Criar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Usuário criado
        "422":
          description: Falha de validação

  /usuarios/{id}:
    get:
      tags: [Usuários]
      summary: Consultar usuário
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados do usuário
    put:
      tags: [Usuários]
      summary: Atualizar usuário
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Usuário atualizado
        "422":
          description: Falha de validação ou regra de negócio

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    OrderIdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    StatusParam:
      in: query
      name: status
      schema:
        type: string
        enum: [aberta, em_execucao, finalizada, nao_executada, cancelada]
    PrioridadeParam:
      in: query
      name: prioridade
      schema:
        type: integer
        enum: [1, 2, 3]
    TipoParam:
      in: query
      name: tipo
      schema:
        type: string
    SearchParam:
      in: query
      name: q
      schema:
        type: string
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
    PerPageParam:
      in: query
      name: per_page
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [token, email, password, password_confirmation]
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string
    ChangePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [administrador, tecnico, atendente]
        is_active:
          type: boolean
        must_change_password:
          type: boolean
        valor_hora:
          type: number
          nullable: true
    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
    Address:
      type: object
      required: [logradouro, bairro, cidade, estado, cep]
      properties:
        logradouro:
          type: string
        numero:
          type: string
          nullable: true
        complemento:
          type: string
          nullable: true
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          minLength: 2
          maxLength: 2
        cep:
          type: string
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        numero:
          type: string
        tipo:
          type: string
        nome_cliente:
          type: string
          nullable: true
        status:
          type: string
        prioridade:
          type: integer
        data_abertura:
          type: string
          format: date-time
        data_encerramento:
          type: string
          format: date-time
          nullable: true
        descricao:
          type: string
        motivo_nao_execucao:
          type: string
          nullable: true
    PaginatedOrders:
      type: object
      properties:
        current_page:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer
    CreateOrderRequest:
      type: object
      required: [tipo_servico, prioridade, descricao, endereco]
      properties:
        tipo_servico:
          type: string
        nome_cliente:
          type: string
          nullable: true
        prioridade:
          type: integer
          enum: [1, 2, 3]
        descricao:
          type: string
        data_abertura:
          type: string
          format: date-time
        endereco:
          $ref: "#/components/schemas/Address"
    FinishExecutionRequest:
      type: object
      required: [execucao_id]
      properties:
        execucao_id:
          type: string
          format: uuid
        data_fim:
          type: string
          format: date-time
        observacao:
          type: string
        funcionarios:
          type: array
          items:
            type: object
            properties:
              funcionario_id:
                type: string
                format: uuid
              data_inicio:
                type: string
                format: date-time
              data_fim:
                type: string
                format: date-time
    NotExecutedRequest:
      type: object
      required: [motivo_nao_execucao]
      properties:
        motivo_nao_execucao:
          type: string
    AttachmentUploadRequest:
      type: object
      required: [arquivo]
      properties:
        arquivo:
          type: string
          format: binary
        tipo:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        precisao_metros:
          type: number
        geolocalizacao_capturada_em:
          type: string
          format: date-time
        endereco_capturado:
          type: string
    CreateUserRequest:
      type: object
      required: [name, email, role, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [administrador, tecnico, atendente]
        password:
          type: string
        valor_hora:
          type: number
          nullable: true
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [administrador, tecnico, atendente]
        password:
          type: string
        is_active:
          type: boolean
        valor_hora:
          type: number
          nullable: true
