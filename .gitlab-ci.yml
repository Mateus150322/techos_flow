stages:
  - quality

default:
  interruptible: true

frontend_quality:
  stage: quality
  image: node:20-bookworm
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npx tsc -b
    - npm run test:a11y
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
